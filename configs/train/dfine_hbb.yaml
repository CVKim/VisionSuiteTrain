# D-FINE HBB detection — DETR-family. 학습 엔진=ultralytics RT-DETR(DetrHbbTrainer, 구현됨).
# export 컨트랙트는 yolov8_hbb drop-in: [1, 4+NC, A] channel-first(query-major→transpose),
# 박스는 입력px 로 스케일(VSC [0,H] 정합). RF-DETR 은 arch: rfdetr_hbb 로 동형.
# ⚠ RT-DETR top-300 query → imgsz ≥ 320 권장(작으면 'index k out of range').
# (정확한 D-FINE upstream 가중치는 동일 어댑터 뒤 엔진 교체.)
schema_version: 1

run:
  name: demo_dfine
  seed: 42
  out_dir: ./runs/${run.name}

task: hbbdetection
arch: dfine_hbb
arch_variant:
  size: large                  # D-FINE backbone
  num_queries: 300

dataset:
  format: labelme              # labelme_hbb — YOLO 와 동일 입력
  root: ./_local_data/det
  names: [scratch, dent, stain]
  split: { ratio: { train: 0.8, val: 0.1, test: 0.1 } }

train:
  epochs: 100
  batch: 4
  imgsz: 1024
  optimizer: adamw
  lr: 5.0e-4
  weight_decay: 1.25e-4
  amp: false
  gpus: [0]
  workers: 8

export:
  io_names: { input: data, output: output }
  input: { w: 1024, h: 1024, c: 3, value_range: [0.0, 255.0] }
  opset: 17
  dynamic_axes: false
  backend: trt
  fp16: true
  preprocess_carry:
    resize_mode: letterbox
    letterbox_pad_value: 0
    normalize: true
    rgb: true
    patch: { height: 1024, width: 1024, overlap: 0.5 }   # 대형 이미지 타일링
    border_suppression: 0.2                               # 패치 경계 억제(talos manifest 동형)
